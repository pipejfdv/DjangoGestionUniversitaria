<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Index RH</title>
</head>
<style>
    body {
        font-family: fantasy;
    }

    .banner {
        font-size: 70px;
    }

    .alinear-items {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .size-inputs {
        width: 80%;
        margin-left: auto;
        margin-right: auto;
    }
    .texto{
        text-align: center;
        border: solid 1px red;
        position: relative;
        margin-top: auto;
    }
    .footer{
        position: fixed;
        bottom: 0;
        background-color: rgb(58, 58, 58);
        width: 100%;
        color: #ffffff;
    }
</style>

<body>
    <nav class="navbar bg-primary-subtle">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-file-earmark-person-fill" viewBox="0 0 16 16">
                    <path
                        d="M9.293 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.707A1 1 0 0 0 13.707 4L10 .293A1 1 0 0 0 9.293 0M9.5 3.5v-2l3 3h-2a1 1 0 0 1-1-1M11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0m2 5.755V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-.245S4 12 8 12s5 1.755 5 1.755" />
                </svg>
                Recursos Humanos
            </a>
        </div>
    </nav>
    <div class="container-fluid mb-5">
        <div class="row">
            <div class="col-md-6 col-sm-12 mt-5">
                <div class="banner">
                    Area de Recursos Humanos
                </div>
            </div>
            <div class="col-md-6 col-sm-12 mt-5">
                <div class="contenedor-login">
                    <h3 class="mb-5 alinear-items">Bienvenido</h3>
                    <div class="input-group mb-3 size-inputs">
                        <input type="text" class="form-control" placeholder="Usurio" aria-label="Username"
                            aria-describedby="basic-addon1">
                    </div>
                    <div class="input-group mb-3 size-inputs">
                        <input type="password" class="form-control" placeholder="Contraseña" aria-label="Username"
                            aria-describedby="basic-addon1">
                    </div>
                    <button type="button" class="btn btn-success alinear-items size-inputs">Ingresar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container mt-5">
        <div class="col bg-danger-subtle">
            <p class="text-danger texto">Recuerda que debes de tener credenciales previas antes de ingresar;
                sí todavía, no lo has tienes comunica con el administrador.
            </p>
        </div>
    </div>
    <footer class="footer">
        <div class="alinear-items">
            <p class="m-5">© 2026 Recursos Humanos</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
